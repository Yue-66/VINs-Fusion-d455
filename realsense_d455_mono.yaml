%YAML:1.0

#common parameters
imu: 1         
num_of_cam: 1  

imu_topic: "/camera/imu"
image0_topic: "/camera/color/image_raw"
output_path: "/home/nuc_2/output/"

cam0_calib: "cam0_pinhole.yaml"
image_width: 1280
image_height: 720

# Extrinsic parameter between IMU and Camera.
estimate_extrinsic: 2   # 2 = 自动估计外参，不需要精确的初始值

body_T_cam0: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [0.0148655429818, -0.999880929698, 0.00414029679422, -0.0216401454975,
          0.999557249008, 0.0149672133247, 0.025715529948, -0.064676986768,
          -0.0257744366974, 0.00375618835797, 0.999660727178, 0.00981073058949,
          0, 0, 0, 1]

#Multiple thread support
multiple_thread: 1

#feature traker parameters
max_cnt: 200            # max feature number in feature tracking
min_dist: 15            # min distance between two features 
freq: 10                
F_threshold: 1.0        
show_track: 1           
flow_back: 1            

#optimization parameters
max_solver_time: 0.04  
max_num_iterations: 8   
keyframe_parallax: 5.0 

#imu parameters       
acc_n: 0.1          
gyr_n: 0.01         
acc_w: 0.001        
gyr_w: 0.0001       
g_norm: 9.81007     

#unsynchronization parameters
estimate_td: 0                      
td: 0.0                             

#loop closure parameters
load_previous_pose_graph: 0        
pose_graph_save_path: "/home/nuc_2/output/pose_graph/"
save_image: 0                   
